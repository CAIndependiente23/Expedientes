<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Respuestas Expedientes</title>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<style>
body{font-family:Arial;background:#f4f4f4;max-width:1200px;margin:auto;padding:20px}
.container{display:grid;grid-template-columns:1fr 1fr;gap:20px}.panel{background:#fff;padding:16px;border-radius:8px}
label{display:block;margin-top:10px;font-weight:bold}input,select{width:100%;padding:8px;box-sizing:border-box}
#out{white-space:pre-wrap;min-height:500px}.btn{margin-top:10px;padding:10px}#pdfBox{display:none}
#preview img{max-width:120px;margin:5px}
</style></head><body>
<h2>Respuestas Expedientes - GOMA</h2>
<div class="container"><div class="panel">
<label>Tipo</label>
<select id="t" onchange="gen()">
<option value="A">EXCEDE COMPETENCIAS DGSPLU</option>
<option value="B">PLUVIAL DOMICILIARIO</option>
<option value="C">LIMPIEZA</option>
</select>
<label>Expediente</label><input id=e value="EX-2026-28982024--GCABA-MGEYA" oninput="gen()">
<label>Dirección</label><input id=d value="Madariaga 100" oninput="gen()">
<label>Motivo</label><input id=m value="desbordamientos cloacales" oninput="gen()">
<label>Elemento cercano</label><input id=c oninput="gen()">
<div id="pdfBox">
<label>Fotos (hasta 3)</label>
<input type=file id=fotos multiple accept="image/*" onchange="preview()">
<div id="preview"></div>
<button class=btn onclick="pdf()">Generar PDF</button>
</div>
<button class=btn onclick="navigator.clipboard.writeText(out.innerText)">Copiar</button><button class=btn onclick="exportarWord()">Exportar Word</button>
</div><div class="panel"><h3>Vista previa</h3><div id=out></div></div></div>
<script>
function eid(i){return document.getElementById(i).value}
function gen(){
let t=eid('t'),e=eid('e'),d=eid('d'),m=eid('m'),c=eid('c');
pdfBox.style.display=t=="C"?"block":"none";
let cap=c?`, encontrándose aquel más cercano sobre ${c} en estado operativo.`:'.';
let txt="DIRECCIÓN GENERAL SISTEMA PLUVIAL\nDIRECTORA GENERAL\n\n";
if(t=="A"||t=="B"){
txt+=`Por medio de la presente, me dirijo a Ud. atento a la solicitud extendida a través del Expediente Electrónico N° ${e}, relativa a ${m} en la calle ${d}, de esta Ciudad.\n\n`;
txt+=`Al respecto, se informa que no existen elementos de captación o conducción pluvial sobre la mencionada ubicación catastral${cap}\n\n`;
txt+="En ese sentido, es menester destacar que las misiones y funciones concernientes a esta repartición tienen como competencia el mantenimiento preventivo y correctivo de los elementos que componen el sistema de captación y conducción pluvial de la Ciudad Autónoma de Buenos Aires tal como se establece en el Decreto N° 144-GCABA-AJG/26.\n\n";
txt+=t=="A"?"Por lo expuesto, atento a que el objeto causante del perjuicio no corresponde a un elemento de conducción o captación pluvial, las acciones de remediación exceden la órbita de competencias de esta repartición.":"Por último, cabe aclarar que, en caso de tratarse de una problemática relativa al estado de un desagüe pluvial de carácter domiciliario, el mismo es considerado parte integrante de las instalaciones internas del inmueble según el Código de Edificación, por lo que aquellas labores de remediación exceden la órbita de competencias de esta repartición.";
txt+="\n\nSin más que agregar, saludo a Ud. muy atte.";
}else{
txt+=`Por medio de la presente, me dirijo a Ud. atento a la solicitud extendida a través del ${e}, relativa a ${m} en el edificio ubicado en la calle ${d}, de esta Ciudad.\n\n`;
txt+="Al respecto esta repartición ejecutó tareas de desobstrucción sobre los elementos de captación y conducción pluvial ubicados en la zona objeto del reclamo, los cuales se encuentran en estado operativo.\n\nSin más que agregar, saludo a Ud. muy atte.";
}
out.innerText=txt;
}
function preview(){
preview.innerHTML="";
[...fotos.files].slice(0,3).forEach(f=>{
let i=document.createElement("img");i.src=URL.createObjectURL(f);preview.appendChild(i);
});
}
async function pdf(){
const {jsPDF}=window.jspdf;let doc=new jsPDF();let y=15;
doc.setFontSize(11);
doc.text(out.innerText,10,y,{maxWidth:180});y=120;
for(const f of [...fotos.files].slice(0,3)){
let data=await new Promise(r=>{let fr=new FileReader();fr.onload=e=>r(e.target.result);fr.readAsDataURL(f);});
doc.addPage();doc.addImage(data,'JPEG',15,20,180,140);
}
doc.save("Informe_Limpieza.pdf");
}
function exportarWord(){
const html='<!DOCTYPE html><html><head><meta charset="utf-8"></head><body><pre style="font-family:Calibri;white-space:pre-wrap">'+out.innerText.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")+'</pre></body></html>';
const blob=new Blob([html],{type:"application/msword"});
const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="Respuesta_Expediente.doc";a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);}
gen();
</script></body></html>
